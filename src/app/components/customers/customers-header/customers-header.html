<div class="flex items-center justify-between">
  <!-- TITLE -->
  <div>
    <h1 class="text-xl font-semibold text-foreground">Customers</h1>

    <p class="text-sm text-muted-foreground">{{ totalCustomers }} clients</p>
  </div>

  <!-- ACTIONS -->
  <div class="flex items-center gap-2">
    <!-- COMPANY SELECT -->
    <div class="w-40" *ngIf="canSelectCompany">
      <select
        class="w-full px-3 py-2 text-sm text-foreground rounded-xl bg-input-background border border-border focus:outline-none focus:ring-2 focus:ring-primary/30 transition"
        [(ngModel)]="selectedCompanyId"
        (ngModelChange)="companyChange.emit($event)"
      >
        <option [ngValue]="null">All companies</option>

        <option *ngFor="let c of companies" [ngValue]="c.id">
          {{ c.name }}
        </option>
      </select>
    </div>

    <!-- SEARCH -->
    <div class="relative">
      <lucide-angular
        [img]="icons.Search"
        class="absolute left-1 top-1/2 -translate-y-1/2 text-muted-foreground w-4 h-4"
      >
      </lucide-angular>

      <input
        [ngModel]="searchTerm"
        (ngModelChange)="searchChange.emit($event)"
        placeholder="Search clients..."
        class="pl-8 pr-3 py-1.5 text-sm rounded-xl bg-input-background border border-border focus:outline-none focus:ring-2 focus:ring-primary/30 transition"
      />
    </div>

    <!-- ADD -->
    <button
      (click)="addCustomer.emit()"
      class="inline-flex items-center rounded-xl font-medium transition cursor-pointer px-4 py-1.5 text-sm gap-1.5 bg-primary text-primary-foreground hover:opacity-90 active:scale-95"
    >
      <lucide-angular [img]="icons.Plus" class="w-4 h-4"> </lucide-angular>

      Add Client
    </button>
  </div>
</div>
