<div class="px-4 py-3 border-b border-sidebar-border">

  <div class="flex items-center gap-2.5">

    <img
      [src]="'https://api.dicebear.com/7.x/initials/svg?seed=' + (user?.fullName || 'User')"
      class="w-7 h-7 rounded-full"
    />

    <div class="flex-1 min-w-0">

      <div class="text-xs font-semibold text-foreground truncate">
        {{ user?.fullName }}
      </div>

      <span
        class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
        [ngClass]="{
          'bg-primary/10 text-primary': user?.role === 'OWNER',
          'bg-blue-500/10 text-blue-400': user?.role === 'ADMIN',
          'bg-emerald-500/10 text-emerald-400': user?.role === 'USER'
        }"
      >
        {{ user?.role }}
      </span>

    </div>

  </div>

</div>
