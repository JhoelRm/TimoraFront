<main class="flex-1 overflow-auto p-6">
  <div class="space-y-4">

    <!-- HEADER -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold text-foreground">Users</h1>
        <p class="text-sm text-muted-foreground">
          {{ users.length }} members
        </p>
      </div>

      <div class="flex items-center gap-2">

        <!-- Company select (placeholder) -->
        <div class="w-40">
          <select
            class="w-full bg-secondary border border-border rounded-xl px-3 py-2 text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all">
            <option value="1">Luxe Studio</option>
            <option value="2">Meridian Wellness</option>
          </select>
        </div>

        <!-- SEARCH (UI ready, logic futura) -->
        <div class="relative">
          <lucide-angular [img]="icons.Search"
            class="absolute left-1 top-1/2 -translate-y-1/2 text-muted-foreground w-4 h-4">
          </lucide-angular>

          <input placeholder="Search users…"
            class="pl-8 pr-3 py-1.5 text-sm bg-secondary border border-border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 w-44 text-foreground placeholder:text-muted-foreground" />
        </div>

        <!-- NEW USER -->
        <button (click)="onCreate()"
          class="inline-flex items-center rounded-xl font-medium transition-all cursor-pointer px-4 py-1.5 text-sm gap-1.5 bg-primary text-primary-foreground hover:opacity-90 active:scale-95">
          <lucide-angular [img]="icons.Plus" class="w-4 h-4"></lucide-angular>
          New User
        </button>

      </div>
    </div>

    <!-- TABLE -->
    <div class="bg-card border border-border rounded-2xl overflow-hidden">

      <table class="w-full text-sm">

        <!-- HEADER -->
        <thead class="border-b border-border">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">User</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">Email</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">Role</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">Type</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">Status</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">Permissions</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground"></th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody class="divide-y divide-border">

          <tr *ngFor="let u of users" class="hover:bg-secondary/20 transition-colors">

            <!-- USER -->
            <td class="px-4 py-3">
              <div class="flex items-center gap-3">

                <div
                  class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-xs font-bold text-primary">
                  {{ u.person.firstName.charAt(0) }}
                </div>

                <div>
                  <div class="font-medium text-foreground">
                    {{ u.person.firstName }} {{ u.person.lastName }}
                  </div>
                  <div class="text-xs text-muted-foreground">
                    {{ u.person.phone }}
                  </div>
                </div>

              </div>
            </td>

            <!-- EMAIL -->
            <td class="px-4 py-3 text-muted-foreground text-xs font-mono">
              {{ u.user.email }}
            </td>

            <!-- ROLE -->
            <td class="px-4 py-3">
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium" [ngClass]="{
                  'bg-amber-500/10 text-amber-400': u.user.role === 'OWNER',
                  'bg-blue-500/10 text-blue-400': u.user.role === 'ADMIN',
                  'bg-primary/10 text-primary': u.user.role === 'USER',
                  'bg-secondary text-muted-foreground': u.user.role === 'STAFF'
                }">
                {{ u.user.role }}
              </span>
            </td>

            <!-- TYPE -->
            <td class="px-4 py-3">
              <div class="flex gap-1">
                <span
                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-primary/10 text-primary">
                  User
                </span>

                <span *ngIf="u.customer || u.supplier"
                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400">
                  {{ u.customer ? 'Customer' : 'Supplier' }}
                </span>
              </div>
            </td>

            <!-- STATUS -->
            <td class="px-4 py-3">
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium" [ngClass]="{
                  'bg-emerald-500/10 text-emerald-400': u.person.status === 'ACTIVE',
                  'bg-red-500/10 text-red-400': u.person.status === 'INACTIVE'
                }">
                {{ u.person.status }}
              </span>
            </td>

            <!-- PERMISSIONS -->
            <td class="px-4 py-3">
              <button
                class="inline-flex items-center rounded-xl font-medium transition-all cursor-pointer px-2.5 py-1 text-xs gap-1 text-muted-foreground hover:text-foreground hover:bg-secondary">
                <lucide-angular [img]="icons.Shield" class="w-4 h-4"></lucide-angular>
                Perms
              </button>
            </td>

            <!-- ACTIONS -->
            <td class="px-4 py-3">
              <div class="flex gap-1">

                <button (click)="onEdit(u.person.id)"
                  class="inline-flex items-center rounded-xl px-2.5 py-1 text-xs text-muted-foreground hover:text-foreground hover:bg-secondary">
                  <lucide-angular [img]="icons.Pencil" class="w-4 h-4"></lucide-angular>
                </button>

                <button (click)="onDelete(u.person.id)"
                  class="inline-flex items-center rounded-xl px-2.5 py-1 text-xs bg-destructive/10 text-destructive hover:bg-destructive/20">
                  <lucide-angular [img]="icons.Trash2" class="w-4 h-4"></lucide-angular>
                </button>

              </div>
            </td>

          </tr>

        </tbody>
      </table>
    </div>

  </div>
</main>
