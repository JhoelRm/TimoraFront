<main class="flex-1 overflow-auto p-6">
  <div class="space-y-4">
    <!-- HEADER -->
    <app-customers-header
      [totalCustomers]="customers.length"
      [companies]="companies"
      [selectedCompanyId]="selectedCompanyId"
      [searchTerm]="searchTerm"
      [canSelectCompany]="canSelectCompany"
      (searchChange)="searchTerm = $event; applyFilter()"
      (companyChange)="selectedCompanyId = $event; applyFilter()"
      (addCustomer)="openCreateModal()"
    >
    </app-customers-header>

    <!-- TABLE -->
    <app-customers-table
      [customers]="customers"
      (editCustomer)="onEdit($event)"
      (deleteCustomer)="onDelete($event)"
    >
    </app-customers-table>
  </div>
</main>

<!-- ========================= -->
<!-- CREATE CUSTOMER MODAL -->
<!-- ========================= -->
<app-customer-create-modal
  [open]="modalOpen"
  [companies]="companies"
  [currentUser]="currentUser"
  [form]="customerForm"
  [canSelectCompany]="canSelectCompany"
  (openChange)="modalOpen = $event"
  (save)="createCustomer()"
>
</app-customer-create-modal>

<!-- ========================= -->
<!-- EDIT CUSTOMER MODAL -->
<!-- ========================= -->
<app-customer-edit-modal
  [open]="editModalOpen"
  [form]="editForm"
  (openChange)="editModalOpen = $event"
  (save)="updateCustomer()"
>
</app-customer-edit-modal>

<!-- ========================= -->
<!-- DELETE CONFIRMATION MODAL -->
<!-- ========================= -->
<app-customer-delete-modal
  [open]="deleteModalOpen"
  [customer]="customerToDelete"
  (openChange)="deleteModalOpen = $event"
  (confirm)="confirmDelete()"
>
</app-customer-delete-modal>
