<div class="overflow-y-auto flex-1 p-6 space-y-5">
  <!-- Customer selector -->
  <div *ngIf="mode === 'create'">
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Cliente *
    </label>
    <select
      [(ngModel)]="formData.customerId"
      class="w-full h-11 px-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring transition cursor-pointer">
      <option [ngValue]="0">Seleccionar cliente</option>
      <option *ngFor="let customer of customers" [ngValue]="customer.customer?.id">
        {{ getCustomerName(customer) }}
      </option>
    </select>
  </div>

  <!-- Service selector -->
  <div *ngIf="mode === 'create'">
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Servicio *
    </label>
    <select
      [(ngModel)]="formData.serviceId"
      class="w-full h-11 px-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring transition cursor-pointer">
      <option [ngValue]="0">Seleccionar servicio</option>
      <option *ngFor="let service of services" [ngValue]="service.id">
        {{ getServiceLabel(service) }}
      </option>
    </select>
  </div>

  <!-- Name -->
  <div>
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Nombre
    </label>
    <input
      type="text"
      [(ngModel)]="formData.name"
      class="w-full h-11 px-3 rounded-xl border border-border bg-input-background text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition"
      placeholder="Nombre de la cita" />
  </div>

  <!-- Type -->
  <div>
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Tipo
    </label>
    <select
      [(ngModel)]="formData.type"
      class="w-full h-11 px-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring transition cursor-pointer">
      <option value="APPOINTMENT">APPOINTMENT</option>
      <option value="RESERVATION">RESERVATION</option>
    </select>
  </div>

  <!-- Date & Time -->
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Inicio *
      </label>
      <input
        type="datetime-local"
        [(ngModel)]="formData.startTime"
        class="w-full h-11 px-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>
    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Fin *
      </label>
      <input
        type="datetime-local"
        [(ngModel)]="formData.endTime"
        class="w-full h-11 px-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>
  </div>

  <!-- Description -->
  <div>
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Descripción
    </label>
    <textarea
      [(ngModel)]="formData.description"
      rows="3"
      class="w-full px-3 py-2 rounded-xl border border-border bg-input-background text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition resize-none"
      placeholder="Descripción de la cita..."></textarea>
  </div>
</div>

<div class="flex gap-2 justify-end px-6 py-4 border-t border-border">
  <button
    (click)="cancel.emit()"
    class="px-4 py-1.5 text-sm rounded-xl bg-secondary text-secondary-foreground border-none cursor-pointer hover:opacity-80 transition">
    Cancelar
  </button>
  <button
    (click)="save.emit()"
    class="px-4 py-1.5 text-sm rounded-xl bg-primary text-primary-foreground border-none cursor-pointer hover:opacity-90 transition">
    {{ mode === 'create' ? 'Crear' : 'Guardar' }}
  </button>
</div>
